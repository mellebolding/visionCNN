# ResNet50 + groupnorm on Ecoset136 (no augmentation, size-controlled)
experiment_name: resnet50_groupnorm_ecoset

model:
  name: resnet50_custom
  num_classes: 136
  norm_layer: groupnorm

data:
  dataset: ecoset136
  root: "<ECOSET_ROOT>"
  max_per_class: 1300
  img_size: 224
  backend: pytorch
  no_augment: true
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  gpu_transforms: true

training:
  epochs: 50
  batch_size: 64
  lr: 0.001
  min_lr: 0.00001
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  label_smoothing: 0.1
  use_amp: true
  channels_last: true
  seed: 42
  val_frequency: 2
  save_frequency: 10
  disable_progress_bar: true

logging:
  log_dir: logs

ood_eval:
  enabled: true
  source_dataset: imagenet_ecoset136
  datasets_root: /export/scratch1/home/melle/datasets
  imagenet_c:
    during_training: true
    corruptions_during_training: [gaussian_noise, defocus_blur, fog, contrast]
    severity_during_training: 3
  save_predictions: true

wandb:
  enabled: true
  project: norm-comparison
  group: resnet50-ecoset-norm-experiment
  tags: [resnet50, norm-experiment, ecoset136_sampled, no-augment, groupnorm]
