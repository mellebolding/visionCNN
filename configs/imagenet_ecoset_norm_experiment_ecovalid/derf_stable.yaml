# ResNet50 + Derf (VP, stabilized) on ImageNet-Ecoset136 — eco-valid augmentations, 5-seed run
# Stabilization changes vs derf.yaml:
#   - lr: 0.001 → 0.0003 (lower base LR reduces gradient explosion risk)
#   - warmup_epochs: 5 (linear LR ramp from ~0 to 0.0003 over first 5 epochs)
#   - use_agc: true (Adaptive Gradient Clipping, prevents erf saturation via unbounded gradients)
experiment_name: resnet50_derf_stable_imagenet_ecoset_ecovalid

model:
  name: resnet50_custom
  num_classes: 136
  norm_layer: derf_vp

data:
  dataset: imagenet_ecoset136
  root: "<IMAGENET_ROOT>"
  img_size: 224
  backend: pytorch
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  gpu_transforms: true

  # Eco-valid augmentations (RandomResizedCrop + HFlip always on)
  random_rotation: true
  random_rotation_degrees: 15
  color_jitter: true
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.05
  gaussian_blur: true
  random_grayscale: true
  random_grayscale_p: 0.1

training:
  epochs: 25
  batch_size: 128  # 256 OOMs on 40GB A100 nodes due to F.group_norm intermediate tensors
  lr: 0.0003
  min_lr: 0.000003  # scaled proportionally with lr (same ratio as original)
  warmup_epochs: 5
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  label_smoothing: 0.1
  use_amp: true
  use_agc: true
  channels_last: true
  seed: 42
  checkpoint_schedule:
    - [10, 1]
    - [20, 2]
    - [25, 3]
  disable_progress_bar: true

logging:
  log_dir: logs

ood_eval:
  enabled: true
  source_dataset: imagenet_ecoset136
  datasets_root: /export/scratch1/home/melle/datasets
  imagenet_c:
    during_training: true
    corruptions_during_training: [gaussian_noise, defocus_blur, fog, contrast]
    severity_during_training: 3
  save_predictions: true

wandb:
  enabled: true
  project: norm-comparison
  group: resnet50-imagenet-ecoset-ecovalid-norm-experiment
  tags: [resnet50, norm-experiment, imagenet_ecoset136, ecovalid-aug, derf_vp, derf-stable]
